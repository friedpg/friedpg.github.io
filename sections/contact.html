<!-- ========== CONTACT ========== -->
<section class="section contact" id="contact">
    <div class="container">
        <h2 class="section-title">
            <span class="section-tag">&lt;</span>Contact<span class="section-tag">/&gt;</span>
        </h2>
        <div class="contact-grid">
            <div class="contact-info reveal-left">
                <div class="contact-terminal">
                    <div class="terminal-header">
                        <span class="terminal-dot red"></span>
                        <span class="terminal-dot yellow"></span>
                        <span class="terminal-dot green"></span>
                        <span class="terminal-title">contact.sh</span>
                    </div>
                    <div class="terminal-body">
                        <p><span class="terminal-prompt">$</span> echo $EMAIL</p>
                        <p class="terminal-output"><a href="mailto:mnro0987@naver.com" style="text-decoration: underline; text-underline-offset: 4px;">mnro0987@naver.com</a></p>
                        <p><span class="terminal-prompt">$</span> echo $GITHUB</p>
                        <p class="terminal-output"><a href="https://github.com/friedpg" target="_blank" rel="noopener noreferrer" style="text-decoration: underline; text-underline-offset: 4px;">https://github.com/friedpg</a></p>
                        <p><span class="terminal-prompt">$</span> echo $BLOG</p>
                        <p class="terminal-output">
                            <a href="https://obsidian-shelf-71e.notion.site/1135ade7902882e2919f01b566599ca0?source=copy_link" target="_blank" rel="noopener noreferrer" style="text-decoration: underline; text-underline-offset: 4px;">https://obsidian-shelf-71e.notion.site/...</a></p>
                        <!-- <p><span class="terminal-prompt">$</span> echo $PHONE</p>
                        <p class="terminal-output">010-XXXX-XXXX</p> -->
                    </div>
                </div>
            </div>
            <div class="contact-form-wrapper reveal-right">
                <form class="contact-form glass-card" id="contactForm">
                    <div class="form-group">
                        <label for="name">이름</label>
                        <input type="text" id="name" name="name" placeholder="이름을 입력하세요" required>
                    </div>
                    <div class="form-group">
                        <label for="email">이메일</label>
                        <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" required>
                    </div>
                    <div class="form-group">
                        <label for="message">메시지</label>
                        <textarea id="message" name="message" rows="5" placeholder="메시지를 입력하세요" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">
                        <span class="btn-icon">⟶</span> 메시지 보내기
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
